# ~/.tmux.conf — tmux config

# ── Core ──
set -g prefix C-a
unbind C-b
bind C-a send-prefix
set -g mouse on
set -g history-limit 50000
set -g renumber-windows on
set -g default-terminal "tmux-256color"
set -g allow-passthrough on
set -as terminal-features ",xterm-ghostty:hyperlinks"
setw -g mode-keys vi

# Reload config
unbind r
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# ── Splits (open in current pane's path) ──
bind '\' split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"

# ── Resize panes (vi keys) ──
bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r m resize-pane -Z

# ── Switch panes: Alt+Arrow (no prefix needed) ──
bind -n M-Left  select-pane -L
bind -n M-Down  select-pane -D
bind -n M-Up    select-pane -U
bind -n M-Right select-pane -R

# ── Windows ──
bind c command-prompt -p "window name:" "new-window; rename-window '%%'"

# ── Clipboard (OSC 52 + pbcopy) ──
set -g set-clipboard on
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'pbcopy'
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; send-keys -X copy-pipe-and-cancel 'pbcopy'
bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; send-keys -X copy-pipe-and-cancel 'pbcopy'
bind p run "pbpaste | tmux load-buffer - && tmux paste-buffer"
bind -n MouseDrag1Pane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "copy-mode -M"

# ── Plugins (TPM) ──
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'   # Ctrl-hjkl navigates panes + vim
set -g @plugin 'dracula/tmux'
set -g @dracula-plugins "cpu-usage ram-usage network"
set -g @dracula-show-left-icon session
set -g @dracula-left-icon-padding 1

run '~/.tmux/plugins/tpm/tpm'   # MUST be last before style overrides

# ── Style (after TPM so it overrides Dracula) ──
set -g pane-border-lines heavy
set -g pane-border-style 'fg=colour240'
set -g pane-active-border-style 'fg=colour46,bold'
setw -g mode-style 'fg=blue,bg=default'
