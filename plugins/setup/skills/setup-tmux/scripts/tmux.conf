# refresh with r
unbind r
bind r source-file ~/.tmux.conf

set -g default-terminal "tmux-256color"
set -g allow-passthrough on

# Additional sane pane splitting shortcut
bind '\' split-window -h
bind '-' split-window -v

# ========== Native-like Copy/Paste (Cmd+C/V) ==========
# Enable OSC 52 clipboard integration (works with iTerm2, Alacritty, etc.)
set -g set-clipboard on

# Enable OSC 8 hyperlinks passthrough for Ghostty
set -as terminal-features ",xterm-ghostty:hyperlinks"

# Copy mode: select with mouse or v, copy with y or Enter
# All copies go to system clipboard via pbcopy
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'pbcopy'

# Mouse selection copies to clipboard immediately
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'

# Cmd+V paste from system clipboard (requires terminal pass-through)
# Most terminals (iTerm2, Alacritty) already handle Cmd+V natively
# For extra compatibility, also bind prefix + p to paste
bind p run "pbpaste | tmux load-buffer - && tmux paste-buffer"

# Mouse drag to select and copy (no Option key needed)
bind-key -n MouseDrag1Pane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "copy-mode -M"

# Double-click to select word and copy to clipboard
bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; send-keys -X copy-pipe-and-cancel 'pbcopy'
bind-key -T copy-mode DoubleClick1Pane select-pane \; send-keys -X select-word \; send-keys -X copy-pipe-and-cancel 'pbcopy'

# Triple-click to select line and copy
bind-key -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; send-keys -X copy-pipe-and-cancel 'pbcopy'
bind-key -T copy-mode TripleClick1Pane select-pane \; send-keys -X select-line \; send-keys -X copy-pipe-and-cancel 'pbcopy'

set-option -g pane-border-lines heavy

# easily resizing tmux panes
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
# maximizing and minimizing tmux pane
bind -r m resize-pane -Z

# quick pane switching with Alt+arrow keys (no prefix needed)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# set the prefix key to Ctrl-a instead of Ctrl-b
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g mouse on
set -g history-limit 50000
set -g renumber-windows on

# create window with name
bind-key c command-prompt -p "window name:" "new-window; rename-window '%%'"

# act like vim
setw -g mode-keys vi

set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'christoomey/vim-tmux-navigator' # for navigating panes and vim/nvim with Ctrl-hjkl

set -g @plugin 'dracula/tmux'
# available plugins: battery, cpu-usage, git, gpu-usage, ram-usage, network, network-bandwidth, network-ping, weather, time
set -g @dracula-plugins "cpu-usage ram-usage network"
set -g @dracula-show-left-icon session
set -g @dracula-left-icon-padding 1
set -g @dracula-battery-label "Battery"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

set-window-option -g mode-style 'fg=blue,bg=default'

# Override theme settings: make active pane border more visible
# These are placed after tpm to override Dracula theme
set -g pane-border-style 'fg=colour240'
set -g pane-active-border-style 'fg=colour46,bold'
